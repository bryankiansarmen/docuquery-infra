elasticsearchHosts: "http://elasticsearch-master:9200"
protocol: http
elasticsearchCertificateSecret: ""


resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

service:
  type: NodePort
  nodePort: 30056

# disable security to match Elasticsearch
kibanaConfig:
  kibana.yml: |
    elasticsearch.hosts: ["http://elasticsearch-master:9200"]
    xpack.security.enabled: false
    xpack.fleet.enabled: false

readinessProbe:
  failureThreshold: 20
  initialDelaySeconds: 60    # Kibana takes longer to start
  periodSeconds: 10
  successThreshold: 3
  timeoutSeconds: 5